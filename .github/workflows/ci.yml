name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Biome + ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      - name: Biome
        run: bunx biome check .
      - name: ESLint
        run: bunx eslint .

  typecheck:
    name: Typecheck (${{ matrix.workspace }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [packages/shared, apps/backend, apps/frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      - run: bun run --cwd ${{ matrix.workspace }} typecheck

  build:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.5
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run --cwd apps/frontend build
        env:
          # The static export reads these at build time; CI only needs the
          # build to succeed, so placeholder URLs are sufficient.
          NEXT_PUBLIC_BASE_URL: https://sheet.stream
          NEXT_PUBLIC_BACKEND_URL: https://api.sheet.stream
